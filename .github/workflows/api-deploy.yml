name: Deploy API

on:
  push:
    branches: [ main ]
    paths:
      - 'api/**'
      - '.github/workflows/api-deploy.yml'

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Debug repo structure
      #   run: |
      #     pwd
      #     ls -la
      #     find . -maxdepth 2 -type d | sort

      # - name: Setup PHP
      #   uses: shivammathur/setup-php@v2
      #   with:
      #     php-version: '8.2'
      #     extensions: mbstring, pdo_mysql, redis
      #     coverage: none

      # - name: Validate composer
      #   run: composer validate --no-check-publish

      # - name: Install dependencies
      #   run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote folder exists
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "ls -la ~/Docker/fronted/html"

      - name: Deploy API with rsync
        run: |
          rsync -azv --delete \
            --exclude='.env' \
            --exclude='tests' \
            --exclude='.git' \
            --exclude='.github' \
            -e "ssh -p 22" \
            ./ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/Docker/fronted/html"

