name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, redis
          coverage: none

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: PHP syntax check
        run: |
          find . -name '*.php' -not -path './vendor/*' -exec php -l {} \; | grep -v 'No syntax errors' && exit 1 || echo "All PHP files OK"

      - name: Class autoload check
        run: |
          php -r '
            require "vendor/autoload.php";
            $classes = ["App\PDO_CON", "App\REDIS_CON", "App\Authentication", "App\RedisService", "App\TokenService", "App\Router"];
            foreach ($classes as $c) { class_exists($c) ?: throw new Exception("$c not found"); }
            echo "All classes autoload OK\n";
          '

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend files
        run: |
          rsync -azv --delete \
            --exclude='.env' \
            --exclude='tests' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='vendor' \
            --rsync-path="sudo rsync" \
            ./ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/Docker/backend/html"

      - name: Fix file ownership
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "sudo chown -R ${{ secrets.DEPLOY_USER }}:${{ secrets.DEPLOY_USER }} ~/Docker/backend/html"

      - name: Create .env on server
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
          cat > ~/Docker/backend/.env << 'ENVFILE'
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          ENVFILE
          EOF

      - name: Restart backend container
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "docker restart backend && docker compose up -d backend"

      - name: Health check
        run: |
          sleep 5
          curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://harpapi.smartech.bg/login -X OPTIONS | grep -q '200' && echo 'OPTIONS OK' || echo 'WARNING: OPTIONS failed'
          curl -s --max-time 10 https://harpapi.smartech.bg/nonexistent | grep -q 'Not found' && echo '404 route OK' || echo 'WARNING: 404 route failed'
